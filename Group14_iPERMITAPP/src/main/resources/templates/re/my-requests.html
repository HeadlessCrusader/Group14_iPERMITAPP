<!DOCTYPE html>
<html>
<body>
    <h2>My Permit Requests</h2>

    <table border="1">
        <tr>
            <th>Request #</th>
            <th>Status</th>
            <th>Fee</th>
            <th>Action</th>
        </tr>

        <tr th:each="req : ${requests}">
            <td th:text="${req.requestNo}"></td>

            <td th:text="${paidMap[req.requestNo]} ? 'PAID' : 'UNPAID'"></td>

            <td>$<span th:text="${req.permitFee}"></span></td>

            <td>
                <a th:if="${!paidMap[req.requestNo]}"
                   th:href="@{/re/pay(requestNo=${req.requestNo})}">
                    <button>Pay</button>
                </a>

                <span th:if="${paidMap[req.requestNo]}">✔ Paid</span>
            </td>
        </tr>
    </table>

    <br>
    <a href="/re/dashboard">Back</a>
</body>
</html>
