<!DOCTYPE html>
<html>
<head>
    <title>Permit Report</title>
    <style>
        body { font-family: Arial; background-color: #f5f5f5; }
        .container { width: 900px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f0f0f0; }
        .top-bar { margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <a href="/eo/dashboard">← Back to Dashboard</a>
    </div>
    <h2>All Permit Requests Report</h2>
	<table style="width: 100%; border-collapse: collapse; font-size: 12px;">
	    <thead>
	        <tr style="background-color: #f0f0f0;">
	            <th>ID</th>
	            <th>Org</th>
	            <th>Site Address</th>
	            <th>Site Contact</th>
	            <th>Permit</th>
	            <th>Date</th>
	            <th>Status</th>
	            <th>Fee</th>
	        </tr>
	    </thead>
	    <tbody>
	        <tr th:each="req : ${requests}">
	            <td th:text="${req.requestNo}"></td>
	            <td th:text="${req.re.organizationName}"></td>
	            <!-- Access site info safely -->
	            <td th:text="${req.site?.siteAddress ?: 'N/A'}"></td>
	            <td th:text="${req.site?.siteContactPerson ?: 'N/A'}"></td>
	            <td th:text="${req.environmentalPermit.permitName}"></td>
	            <td th:text="${#dates.format(req.dateOfRequest, 'yyyy-MM-dd')}"></td>
	            <td th:text="${statusMap[req.requestNo] ?: 'Pending Payment'}"></td>
	            <td th:text="'$' + ${req.permitFee}"></td>
	        </tr>
	    </tbody>
	</table>
</div>
</body>
</html>
