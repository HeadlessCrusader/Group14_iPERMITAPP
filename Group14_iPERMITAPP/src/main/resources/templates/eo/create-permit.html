<!DOCTYPE html>
<html>
<head>
    <title>Create Permit Type</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 60px auto;
            padding: 25px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #2d6cdf;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #1f56b8;
        }

        .top-bar {
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            color: blue;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="top-bar">
        <a href="/eo/dashboard">← Back to Dashboard</a>
    </div>

    <h2>Create Permit Type</h2>

    <form method="post" action="/eo/permits/create">
        <div class="form-group">
            <label>Permit ID</label>
            <input name="permitID" placeholder="e.g., AIR" required />
        </div>

        <div class="form-group">
            <label>Permit Name</label>
            <input name="permitName" placeholder="e.g., Air Quality Permit" required />
        </div>

        <div class="form-group">
            <label>Fee ($)</label>
            <input name="permitFee" type="number" step="0.01" placeholder="e.g., 100.00" required />
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" placeholder="Enter details..."></textarea>
        </div>

        <button type="submit">Save Permit Type</button>
    </form>
</div>

</body>
</html>
